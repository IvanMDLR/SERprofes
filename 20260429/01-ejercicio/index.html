<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Liquid Glass Form</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="form-container">
    <h2>Connect With Us</h2>
    <p>UI estilo iOS Liquid Glass</p>

    <form>
        <div class="input-group">
            <label>Nombre</label>
            <input type="text" placeholder="Ej. Ivan">
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="hola@ia.com">
        </div>

        <button class="btn-enviar" type="button">
            Enviar Mensaje
        </button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
